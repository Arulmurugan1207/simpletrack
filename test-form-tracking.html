<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Tracking Test - Pulzivo Analytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }
    
    h1 {
      color: #1e293b;
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }
    
    button {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .status.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }
    
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    
    .status.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }
    
    .config {
      background: #f8fafc;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    
    .config-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }
    
    .stat-box {
      background: #f8fafc;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Test Form Tracking</h1>
    <p class="subtitle">This form sends events to your analytics dashboard</p>
    
    <div class="config">
      <label class="config-label">Your API Key</label>
      <input type="text" id="apiKey" placeholder="Enter your API key" value="">
    </div>
    
    <form id="testForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      
      <div class="form-group">
        <label for="formType">Form Type</label>
        <select id="formType" name="formType" required>
          <option value="contact-form">Contact Form</option>
          <option value="sign-up-form">Sign Up Form</option>
          <option value="sign-in-form">Sign In Form</option>
          <option value="checkout-form">Checkout Form</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="message">Message (Optional)</label>
        <textarea id="message" name="message" placeholder="Type a message..."></textarea>
      </div>
      
      <div class="button-group">
        <button type="submit" class="btn-primary">Submit Form</button>
        <button type="button" class="btn-secondary" onclick="abandonForm()">Abandon</button>
      </div>
    </form>
    
    <div id="status" class="status"></div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-value" id="starts">0</div>
        <div class="stat-label">Starts</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="submits">0</div>
        <div class="stat-label">Submits</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="abandons">0</div>
        <div class="stat-label">Abandons</div>
      </div>
    </div>
  </div>

  <script>
    // Analytics tracking state
    let formStartTime = null;
    let formStarted = false;
    let userId = 'test_user_' + Math.random().toString(36).substr(2, 9);
    let stats = { starts: 0, submits: 0, abandons: 0 };

    // API Configuration
    const API_URL = 'http://localhost:3004/analytics/events';

    // Helper function to send analytics event
    async function sendEvent(eventName, eventData = {}) {
      const apiKey = document.getElementById('apiKey').value;
      
      if (!apiKey) {
        showStatus('error', 'Please enter your API key first!');
        return false;
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            apiKey: apiKey,
            event_name: eventName,
            user_id: userId,
            data: {
              ...eventData,
              page: window.location.pathname,
              userAgent: navigator.userAgent
            }
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return true;
      } catch (error) {
        console.error('Event send error:', error);
        showStatus('error', `Failed to send ${eventName}: ${error.message}`);
        return false;
      }
    }

    // Show status message
    function showStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status ${type}`;
      status.textContent = message;
      status.style.display = 'block';
      
      setTimeout(() => {
        status.style.display = 'none';
      }, 5000);
    }

    // Update stats display
    function updateStats() {
      document.getElementById('starts').textContent = stats.starts;
      document.getElementById('submits').textContent = stats.submits;
      document.getElementById('abandons').textContent = stats.abandons;
    }

    // Track form start
    document.getElementById('testForm').addEventListener('focusin', async function(e) {
      if (!formStarted && e.target.tagName !== 'BUTTON') {
        formStarted = true;
        formStartTime = Date.now();
        
        const formType = document.getElementById('formType').value;
        const success = await sendEvent('form_start', {
          formId: formType
        });
        
        if (success) {
          stats.starts++;
          updateStats();
          showStatus('success', '✅ Form start tracked!');
        }
      }
    }, true);

    // Track field interactions
    document.querySelectorAll('input, textarea, select').forEach(field => {
      if (field.id === 'apiKey') return; // Skip API key field
      
      field.addEventListener('focus', async function() {
        if (formStarted) {
          const formType = document.getElementById('formType').value;
          await sendEvent('form_field_interaction', {
            formId: formType,
            fieldName: this.name || this.id,
            action: 'focus'
          });
        }
      });
    });

    // Track form submission
    document.getElementById('testForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const formType = document.getElementById('formType').value;
      const timeToComplete = formStartTime ? (Date.now() - formStartTime) / 1000 : 0;
      
      const success = await sendEvent('form_submit', {
        formId: formType,
        success: true,
        timeToComplete: timeToComplete
      });
      
      if (success) {
        stats.submits++;
        updateStats();
        showStatus('success', `✅ Form submitted! (${timeToComplete.toFixed(1)}s)`);
        
        // Reset form
        setTimeout(() => {
          document.getElementById('testForm').reset();
          formStarted = false;
          formStartTime = null;
        }, 1000);
      }
    });

    // Track form abandonment
    async function abandonForm() {
      if (!formStarted) {
        showStatus('info', 'Start filling the form first to track abandonment');
        return;
      }
      
      const formType = document.getElementById('formType').value;
      const filledFields = Array.from(document.querySelectorAll('#testForm input, #testForm textarea, #testForm select'))
        .filter(f => f.id !== 'apiKey' && f.value.trim() !== '').length;
      const totalFields = 4;
      
      const success = await sendEvent('form_abandon', {
        formId: formType,
        fieldsCompleted: filledFields,
        totalFields: totalFields
      });
      
      if (success) {
        stats.abandons++;
        updateStats();
        showStatus('info', `ℹ️ Form abandonment tracked (${filledFields}/${totalFields} fields)`);
        
        // Reset form
        setTimeout(() => {
          document.getElementById('testForm').reset();
          formStarted = false;
          formStartTime = null;
        }, 1000);
      }
    }

    // Load API key from localStorage if exists
    const savedApiKey = localStorage.getItem('pulzivo_test_api_key');
    if (savedApiKey) {
      document.getElementById('apiKey').value = savedApiKey;
    }

    // Save API key to localStorage when changed
    document.getElementById('apiKey').addEventListener('change', function() {
      localStorage.setItem('pulzivo_test_api_key', this.value);
    });

    console.log('🎯 Form tracking test page loaded');
    console.log('User ID:', userId);
  </script>
</body>
</html>
