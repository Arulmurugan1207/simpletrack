<body>
  <app-root></app-root>
  <!-- Pulzivo Analytics -->
  <script>
    (function() {
      var isProd = window.location.hostname !== 'localhost';
      var s = document.createElement('script');
      s.src = isProd ? './pulzivo-analytics.min.js' : './pulzivo-analytics.js';
      s.dataset.apiKey    = isProd ? 'STK-1A6S9'  : 'STK-HEBB9';
      s.dataset.apiUrl    = isProd
        ? 'https://analytics-dot-node-server-apis.ue.r.appspot.com/analytics/log'
        : 'http://localhost:3004/analytics/log';
      s.dataset.batchInterval = '5000';
      //s.dataset.debug     = isProd ? 'false' : 'true';
      document.head.appendChild(s);
    })();
  </script>
