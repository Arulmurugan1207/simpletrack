<header class="site-header" [class.menu-open]="mobileMenuOpen()">

  <!-- ===== Top bar ===== -->
  <div class="header-inner container">

    <!-- Hamburger (mobile left) -->
    <button class="hamburger" (click)="toggleMobileMenu()" [attr.aria-expanded]="mobileMenuOpen()" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <!-- Logo -->
    <a class="brand" routerLink="/" [queryParams]="{utm_source: 'header', utm_medium: 'nav', utm_campaign: 'logo'}" (click)="mobileMenuOpen.set(false)" data-click="logo">
      <span class="brand-name">Pulzivo<span class="brand-accent"> Analytics</span></span>
    </a>

    <!-- Desktop nav -->
    <nav class="desktop-nav" aria-label="Primary navigation">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" class="nav-link" [class.active]="isActive(item.path)">
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Desktop actions -->
    <div class="header-actions">
      @if (!isLoggedIn) {
        <button class="btn-ghost desktop-only" (click)="openSignIn()">Sign In</button>
        <button class="btn-primary desktop-only" (click)="openSignUp()">Get Started</button>
        <button class="icon-btn mobile-only" (click)="openSignIn()" aria-label="Sign In" title="Sign In">
          <i class="pi pi-sign-in"></i>
        </button>
        <button class="icon-btn icon-btn--accent mobile-only" (click)="openSignUp()" aria-label="Get Started" title="Get Started">
          <i class="pi pi-user-plus"></i>
        </button>
      } @else {
        <button class="btn-primary desktop-only" routerLink="/dashboard">Dashboard</button>
        <button class="avatar-btn" (click)="toggleUserMenu($event)" aria-label="User menu">
          <p-avatar [label]="userInitials" styleClass="user-avatar" shape="circle" />
        </button>
        <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body" />
      }
    </div>

  </div>

  <!-- ===== Mobile drawer ===== -->
  <div class="mobile-drawer" [class.open]="mobileMenuOpen()" role="navigation" aria-label="Mobile navigation">
    <nav class="mobile-nav">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" class="mobile-nav-link" [class.active]="isActive(item.path)"
           (click)="mobileMenuOpen.set(false)">
          {{ item.label }}
        </a>
      }
    </nav>
  </div>

</header>

<!-- Modals -->
<app-sign-in
  (switchToSignUp)="onSwitchToSignUp()"
  (switchToForgotPassword)="onSwitchToForgotPassword()"
  (signInSuccess)="onSignInSuccess($event)">
</app-sign-in>

<app-sign-up
  (switchToSignIn)="onSwitchToSignIn()"
  (close)="onSignUpClosed()"
  (signUpSuccess)="onSignUpSuccess()">
</app-sign-up>

<app-forgot-password
  (backToSignIn)="onBackToSignIn()">
</app-forgot-password>

<app-success></app-success>

<!-- Owner Mode Badge -->
@if (isOwnerModeActive()) {
  <div class="owner-mode-badge">
    🛡️ Owner Mode Active
  </div>
}
